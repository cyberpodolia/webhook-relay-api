version: "3.9"

services:
  influxdb:
    image: influxdb:1.8
    container_name: perf-influxdb
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - perfnet

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: perf-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - cadvisor
      - receiver-fast
      - receiver-slow
      - receiver-flaky
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - perfnet

  grafana:
    image: grafana/grafana:11.2.2
    container_name: perf-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - influxdb
    networks:
      - perfnet

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: perf-cadvisor
    privileged: true
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - perfnet

  receiver-fast:
    build:
      context: ./receivers
    container_name: perf-receiver-fast
    environment:
      RECEIVER_MODE: fast
      RECEIVER_PORT: 8080
    ports:
      - "18101:8080"
    networks:
      - perfnet

  receiver-slow:
    build:
      context: ./receivers
    container_name: perf-receiver-slow
    environment:
      RECEIVER_MODE: slow
      RECEIVER_PORT: 8080
      RECEIVER_SLOW_MS: 1200
    ports:
      - "18102:8080"
    networks:
      - perfnet

  receiver-flaky:
    build:
      context: ./receivers
    container_name: perf-receiver-flaky
    environment:
      RECEIVER_MODE: flaky
      RECEIVER_PORT: 8080
      RECEIVER_FAIL_EVERY: 4
    ports:
      - "18103:8080"
    networks:
      - perfnet

  relay:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: perf-relay
    profiles:
      - docker-relay
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: sqlite:///./data/app.db
      TARGET_URL: http://receiver-fast:8080/ingest
      RELAY_ALLOW_HOSTS: receiver-fast
    ports:
      - "18000:8000"
    depends_on:
      - receiver-fast
    networks:
      - perfnet

volumes:
  influxdb_data:
  prometheus_data:
  grafana_data:

networks:
  perfnet:
    name: perfnet
