services:
  webhook-relay:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=sqlite:///./data/app.db
      - LOG_LEVEL=INFO
      # - TARGET_URL=https://example.com/webhooks/ingest
      # - WEBHOOK_SECRET=change-me
      # - RELAY_ALLOW_HOSTS=example.com
      # - ALLOWED_SOURCES=demo,partner-a
      # - MAX_BODY_BYTES=1048576
      # - EVENT_RETENTION_DAYS=30
      # - ADMIN_TOKEN=change-me
    volumes:
      - ./data:/app/data
